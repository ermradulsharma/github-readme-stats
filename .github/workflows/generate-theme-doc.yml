name: Generate Theme Readme
on:
  push:
    branches:
      - master
    paths:
      - "themes/index.js"
  workflow_dispatch:

permissions: read-all

jobs:
  generateThemeDoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Generate theme doc
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0 # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Fix the unsafe repo error which was introduced by the CVE-2022-24765 git patches.
      - name: Fix unsafe repo error
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: npm install, generate readme
        run: |
          npm ci
          npm run theme-readme-gen
        env:
          CI: true

      - name: Run Script
        uses: skx/github-action-tester@e29768ff4ff67be9d1fdbccd8836ab83233bebb1 # v0.10.0
        with:
          script: ./scripts/push-theme-readme.sh
        env:
          CI: true
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}

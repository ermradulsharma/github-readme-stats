name: Theme preview
on:
  # Temporary disabled due to paused themes addition.
  # See: https://github.com/ermradulsharma/github-readme-stats/issues/3404
  # pull_request_target:
  #   types: [opened, edited, reopened, synchronize]
  #   branches:
  #     - master
  #   paths:
  #     - "themes/index.js"
  workflow_dispatch:

permissions: read-all

jobs:
  previewTheme:
    name: Install & Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0 # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: bahmutov/npm-install@v1.12.1 # v1.12.1
        with:
          useLockFile: false

      - run: npm run preview-theme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
